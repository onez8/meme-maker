<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Meme Maker</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <canvas></canvas>
    <input id="line-width" type="range" min="1" max="10" value="5" />
    <div>
      <input type="color" id="color" />
      <div
        class="color-option"
        style="background-color: #ea2027"
        data-color="#ea2027"
      ></div>
      <div
        class="color-option"
        style="background-color: #fda7df"
        data-color="#fda7df"
      ></div>
      <div
        class="color-option"
        style="background-color: #ee5a24"
        data-color="#ee5a24"
      ></div>
      <div
        class="color-option"
        style="background-color: #ffc312"
        data-color="#ffc312"
      ></div>
      <div
        class="color-option"
        style="background-color: #a3cb38"
        data-color="#a3cb38"
      ></div>
      <div
        class="color-option"
        style="background-color: #009432"
        data-color="#009432"
      ></div>
      <div
        class="color-option"
        style="background-color: #12cbc4"
        data-color="#12cbc4"
      ></div>
      <div
        class="color-option"
        style="background-color: #0652dd"
        data-color="#0652dd"
      ></div>
      <div
        class="color-option"
        style="background-color: #1b1464"
        data-color="#1b1464"
      ></div>
      <div
        class="color-option"
        style="background-color: #6f1e51"
        data-color="#6f1e51"
      ></div>
    </div>
    <button id="mode-btn">Fill</button>
    <button id="destroy-btn">Destroy</button>
    <button id="eraser-btn">Eraser</button>
    <input type="file" accept="image/*" id="file" />
    <input type="text" placeholder="Write and then double click" id="text" />
    <script src="app.js"></script>
  </body>
</html>
