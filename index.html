<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>예지니 그림판</title>
    <script
      src="https://kit.fontawesome.com/05031d89cd.js"
      crossorigin="anonymous"
    ></script>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="color-options">
      <input type="color" id="color" />
      <div
        class="color-option"
        style="background-color: #ea2027"
        data-color="#ea2027"
      ></div>
      <div
        class="color-option"
        style="background-color: #fda7df"
        data-color="#fda7df"
      ></div>
      <div
        class="color-option"
        style="background-color: #ee5a24"
        data-color="#ee5a24"
      ></div>
      <div
        class="color-option"
        style="background-color: #ffc312"
        data-color="#ffc312"
      ></div>
      <div
        class="color-option"
        style="background-color: #a3cb38"
        data-color="#a3cb38"
      ></div>
      <div
        class="color-option"
        style="background-color: #009432"
        data-color="#009432"
      ></div>
      <div
        class="color-option"
        style="background-color: #12cbc4"
        data-color="#12cbc4"
      ></div>
      <div
        class="color-option"
        style="background-color: #0652dd"
        data-color="#0652dd"
      ></div>
      <div
        class="color-option"
        style="background-color: #1b1464"
        data-color="#1b1464"
      ></div>
      <div
        class="color-option"
        style="background-color: #6f1e51"
        data-color="#6f1e51"
      ></div>
    </div>
    <canvas></canvas>

    <div class="btns">
      <div class="icon-btn">
        <button id="undo-btn">
          <i class="fa-solid fa-rotate-left"></i>
        </button>
        <button id="redo-btn">
          <i class="fa-solid fa-rotate-right"></i>
        </button>
      </div>
      <input id="line-width" type="range" min="5" max="20" value="12" />
      <button id="mode-btn">Fill</button>
      <button id="destroy-btn">Destroy</button>
      <button id="eraser-btn">Eraser</button>
      <input id="font-size" type="range" min="20" max="100" value="50" />
      <label for="font-family">
        <select id="font-family" name="font">
          <option selected disabled>Choose a font</option>
          <option value="serif">Serif</option>
          <option value="sans-serif">Sans Serif</option>
          <option value="monospace">Monospace</option>
          <option value="Arial">Arial</option>
          <option value="Georgia">Georgia</option>
          <option value="cursive">Cursive</option>
        </select>
      </label>
      <input type="text" placeholder="Add text here..." id="text" />
      <label for="file">
        Add Photo
        <input type="file" accept="image/*" id="file" />
      </label>
      <button id="save">Save image</button>
    </div>
    <script src="app.js"></script>
  </body>
</html>
